<div class="min-h-screen flex items-center justify-center bg-surface px-4">
  <div class="bg-surface-container-lowest p-8 rounded-xl shadow-lg text-center max-w-md w-full">

    @if (estado === 'cargando') {
      <h2 class="text-xl font-bold mb-2">Activando cuenta...</h2>
      <p class="text-on-surface-variant">Por favor esperá</p>
    }

    @if (estado === 'ok') {
      <h2 class="text-xl font-bold text-green-600 mb-2">✅ Cuenta activada</h2>
      <p>{{ mensaje }}</p>
      <p class="mt-4 text-sm text-on-surface-variant">Redirigiendo al login...</p>
    }

    @if (estado === 'error') {
      <h2 class="text-xl font-bold text-red-500 mb-2">❌ Error</h2>
      <p>{{ mensaje }}</p>
      <a routerLink="/registro" class="text-primary mt-4 inline-block">Volver a registrarse</a>
    }

  </div>
</div>
