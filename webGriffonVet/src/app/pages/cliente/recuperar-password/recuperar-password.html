<div class="min-h-screen bg-surface flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🔑</div>
      <h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight">Recuperar contraseña</h1>
      <p class="text-on-surface-variant mt-2">Te enviamos un link para restablecer tu contraseña.</p>
    </div>

    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-8 shadow-sm">

      @if (enviado) {
        <div class="text-center py-4">
          <div class="text-5xl mb-4">📧</div>
          <p class="text-on-surface font-semibold text-base">
            Si el email existe en nuestro sistema, se envió un link para restablecer la contraseña.
          </p>
          <p class="text-on-surface-variant text-sm mt-2">Revisá tu bandeja de entrada y spam.</p>
          <a routerLink="/login"
            class="mt-6 inline-block w-full text-center editorial-gradient text-white py-4 rounded-full font-bold text-sm uppercase tracking-widest hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20">
            Volver al inicio de sesión
          </a>
        </div>
      } @else {
        <form (ngSubmit)="enviar()" #f="ngForm">
          <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">
              Correo electrónico
            </label>
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="tu@email.com"
              required
              email
              class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface text-sm focus:outline-none focus:border-primary transition-all"
            />
          </div>

          <button
            type="submit"
            [disabled]="f.invalid || cargando"
            class="w-full editorial-gradient text-white py-4 rounded-full font-bold text-sm uppercase tracking-widest hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed">
            @if (cargando) { Enviando... } @else { Enviar link }
          </button>

          <p class="text-center mt-6">
            <a routerLink="/login" class="text-sm text-on-surface-variant hover:text-primary hover:underline transition-colors">
              Volver al inicio de sesión
            </a>
          </p>
        </form>
      }
    </div>
  </div>
</div>
<app-toast></app-toast>
<app-error-modal></app-error-modal>
