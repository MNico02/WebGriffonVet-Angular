<div class="min-h-screen bg-surface flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-6xl mb-4">🐾</div>
      <h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight">Bienvenidos a GriffonVet</h1>
      <p class="text-on-surface-variant mt-2">Iniciá sesión para gestionar tus mascotas y turnos.</p>
    </div>

    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-8 shadow-sm">
        <form (ngSubmit)="login()" #f="ngForm"> 
            <div class="mb-5">
                <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Correo electrónico</label>
                <input type="email" placeholder="tu@email.com" name="correo" [(ngModel)]="correo" required
                class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface text-sm focus:outline-none focus:border-primary transition-all" />
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Contraseña</label>
                <input type="password" name="clave" [(ngModel)]="clave" placeholder="Contraseña" required
                class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface text-on-surface text-sm focus:outline-none focus:border-primary transition-all" />
            </div>

            <button type="submit" [disabled]="f.invalid"
            class="w-full editorial-gradient text-white py-4 rounded-full font-bold text-sm uppercase tracking-widest hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20">
                Iniciar sesión
            </button>
         

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-outline-variant"></div>
                <span class="text-xs text-on-surface-variant uppercase tracking-widest">o</span>
                <div class="flex-1 h-px bg-outline-variant"></div>
            </div>

            <p class="text-center text-sm text-on-surface-variant">
                ¿No tenés cuenta?
               <a routerLink="/registro" class="text-primary font-bold hover:underline ml-1">Registrate gratis</a>
            </p>
            <p class="text-center">
                <a routerLink="/home" class="text-primary font-bold hover:underline ml-1">Inicio</a>
            </p>
        </form>  
    </div>
  </div>
</div>
<app-toast></app-toast>
<app-error-modal></app-error-modal>
