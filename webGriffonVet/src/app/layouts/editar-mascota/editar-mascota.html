<div class="modal-overlay fixed inset-0 bg-black/40 z-50 flex items-center justify-center"
  (click)="onOverlayClick($event)">

  <div class="bg-surface-container-lowest rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto mx-4">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/30">
      <h2 class="font-headline text-lg font-bold text-on-surface">Editar Mascota</h2>
      <button (click)="cerrar.emit()" class="p-2 rounded-full hover:bg-surface-container transition-all">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-5">

      <!-- Nombre -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Nombre</label>
        <input type="text" [(ngModel)]="form.nombre" placeholder="Nombre de la mascota"
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary" />
      </div>

      <!-- Especie + Raza -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Especie</label>
          <select [(ngModel)]="form.id_especie"
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary">
            <option [ngValue]="null" disabled>Seleccionar...</option>
            @for (e of especies; track e.id_especie) {
              <option [ngValue]="e.id_especie">{{ e.nombre }}</option>
            }
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Raza</label>
          <input type="text" [(ngModel)]="form.raza" placeholder="Raza"
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary" />
        </div>
      </div>

      <!-- Sexo -->
      <div class="flex flex-col gap-2">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Sexo</label>
        <div class="flex gap-2">
          @for (s of sexos; track s) {
            <button (click)="form.sexo = s"
              [class]="form.sexo === s
                ? 'flex-1 py-2 rounded-lg text-xs font-bold border-2 border-primary bg-primary-container/30 text-primary transition-all'
                : 'flex-1 py-2 rounded-lg text-xs font-bold border border-outline-variant/30 bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-all'">
              {{ s }}
            </button>
          }
        </div>
      </div>

      <!-- Tamaño -->
      <div class="flex flex-col gap-2">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Tamaño</label>
        <div class="flex gap-2">
          @for (t of tamanios; track t) {
            <button (click)="form.tamanio = t"
              [class]="form.tamanio === t
                ? 'flex-1 py-2 rounded-lg text-xs font-bold border-2 border-primary bg-primary-container/30 text-primary transition-all'
                : 'flex-1 py-2 rounded-lg text-xs font-bold border border-outline-variant/30 bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-all'">
              {{ t }}
            </button>
          }
        </div>
      </div>

      <!-- CASTRADO -->
<div class="flex flex-col gap-2">
  <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
    Castrado
  </label>

  <div class="flex gap-2">
    
    <!-- SI -->
    <button (click)="form.castrado = true"
      [class]="form.castrado === true
        ? 'flex-1 py-2 rounded-lg text-xs font-bold border-2 border-green-600 bg-green-100 text-green-700 transition-all'
        : 'flex-1 py-2 rounded-lg text-xs font-bold border border-outline-variant/30 bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-all'">
      Sí
    </button>

    <!-- NO -->
    <button (click)="form.castrado = false"
      [class]="form.castrado === false
        ? 'flex-1 py-2 rounded-lg text-xs font-bold border-2 border-red-600 bg-red-100 text-red-700 transition-all'
        : 'flex-1 py-2 rounded-lg text-xs font-bold border border-outline-variant/30 bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-all'">
      No
    </button>

  </div>
</div>

      <!-- Fecha de nacimiento -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Fecha de nacimiento</label>
        <input type="date" [(ngModel)]="form.fecha_nacimiento"
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary" />
      </div>

      <!-- Tipo de pelaje + Comportamiento -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Tipo de pelaje</label>
          <input type="text" [(ngModel)]="form.tipo_pelaje" placeholder="Corto, largo, liso..."
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Comportamiento</label>
          <input type="text" [(ngModel)]="form.comportamiento" placeholder="Tranquilo, activo..."
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary" />
        </div>
      </div>

      <!-- Observaciones -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">Observaciones</label>
        <textarea [(ngModel)]="form.observaciones" rows="3" placeholder="Información adicional relevante..."
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary resize-none"></textarea>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/30">
      <button (click)="cerrar.emit()"
        class="px-5 py-2 rounded-full text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-all">
        Cancelar
      </button>
      <button (click)="guardar()" [disabled]="!form.nombre || !form.especie"
        class="px-5 py-2 rounded-full editorial-gradient text-white text-sm font-bold hover:opacity-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        Guardar cambios
      </button>
    </div>

  </div>
</div>
