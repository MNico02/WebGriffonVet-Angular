<div
  class="modal-overlay fixed inset-0 bg-black/40 z-50 flex items-center justify-center"
  (click)="onOverlayClick($event)"
>
  <div
    class="bg-surface-container-lowest rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto mx-4"
  >
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/30">
      <h2 class="font-headline text-lg font-bold text-on-surface">Registrar Enfermedad</h2>
      <button
        (click)="cerrar.emit()"
        class="p-2 rounded-full hover:bg-surface-container transition-all"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-4">
      <!-- Select enfermedad -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Enfermedad
        </label>
        <app-select-con-creacion
          [items]="enfermedadesComoItem()"
          [cargando]="cargandoenfermedades()"
          [guardando]="agregandoEnfermedad"
          [(valorSeleccionado)]="idEnfermedadSeleccionada"
          label="¿No encontrás la enfermedad?"
          placeholder="Seleccionar enfermedad..."
          inputPlaceholder="Ej: Dermatitis"
          (seleccionado)="onEnfermedadSeleccionada($event)"
          (nuevoItem)="onNuevaEnfermedad($event)"
        />
      </div>

      

      <!-- Estado -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant"
          >Estado</label
        >
        <div class="flex gap-2">
          @for (e of estados; track e) {
            <button
              (click)="form.estado = e"
              [class]="
                form.estado === e
                  ? 'flex-1 py-2 rounded-lg text-xs font-bold border-2 border-primary bg-primary-container/30 text-primary transition-all'
                  : 'flex-1 py-2 rounded-lg text-xs font-bold border border-outline-variant/30 bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-all'
              "
            >
              {{ e }}
            </button>
          }
        </div>
      </div>

      <!-- Fecha de diagnóstico -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant"
          >Fecha de diagnóstico</label
        >
        <input
          type="date"
          [(ngModel)]="form.fecha_diagnostico"
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
        />
      </div>

      <!-- Observaciones -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant"
          >Observaciones</label
        >
        <textarea
          [(ngModel)]="form.observaciones"
          rows="3"
          placeholder="Síntomas, tratamiento relacionado..."
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary resize-none"
        ></textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/30">
      <button
        (click)="cerrar.emit()"
        class="px-5 py-2 rounded-full text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-all"
      >
        Cancelar
      </button>
      <button
        (click)="guardar()"
        [disabled]="form.id_enfermedad === 0 || !form.estado || !form.fecha_diagnostico"
        class="px-5 py-2 rounded-full editorial-gradient text-white text-sm font-bold hover:opacity-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Guardar enfermedad
      </button>
    </div>
  </div>
</div>
