
<div class="flex flex-col gap-1">
  <select
    [ngModel]="valorSeleccionado()"
  (ngModelChange)="onSeleccionar($event)"
  [disabled]="cargando()"
    class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
  >
    <option value="0" disabled selected>{{ placeholder() }}</option>
    @for (item of items(); track item.id) {
      <option [value]="item.id">{{ item.nombre }}</option>
    }
  </select>
</div>

<div class="mt-2 p-3 rounded-xl bg-primary/5 border border-primary/20">
  <div class="flex items-center justify-between gap-2 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="text-lg">💡</span>
      <p class="text-sm font-semibold text-primary">{{ label() }}</p>
    </div>
    <button
      (click)="mostrarInput.set(!mostrarInput())"
      class="text-xs font-bold text-primary underline hover:opacity-80"
    >
      + Crear nueva
    </button>
  </div>

  @if (mostrarInput()) {
    <div class="flex gap-2 mt-3">
      <input
        type="text"
        [(ngModel)]="nuevoNombre"
        [placeholder]="inputPlaceholder()"
        class="flex-1 bg-white rounded-lg px-3 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
      />
      <button
        (click)="confirmarNuevo()"
        [disabled]="guardando() || !nuevoNombre.trim()"
        class="px-4 py-2 rounded-lg bg-primary text-white text-xs font-bold hover:opacity-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap"
      >
        {{ guardando() ? 'Guardando...' : '+ Agregar' }}
      </button>
    </div>
  }
</div>
