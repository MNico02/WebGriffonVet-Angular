<div
  class="modal-overlay fixed inset-0 bg-black/40 z-50 flex items-center justify-center"
  (click)="onOverlayClick($event)"
>
  <div
    class="bg-surface-container-lowest rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto mx-4"
  >
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant/30">
      <h2 class="font-headline text-lg font-bold text-on-surface">Nueva Mascota</h2>

      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 rounded-full hover:bg-surface-container transition-all"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-5">
      <!-- Nombre -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Nombre
        </label>

        <input
          type="text"
          [(ngModel)]="formMascota.nombre"
          placeholder="Nombre de la mascota"
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
        />
      </div>

      <!-- Especie + Raza -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
            Especie
          </label>

          <select
            [(ngModel)]="formMascota.id_especie"
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary w-full"
          >
            <option [ngValue]="null">Especie</option>
            @for (e of especies; track e.id_especie) {
              <option [ngValue]="e.id_especie">{{ e.nombre }}</option>
            }
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
            Raza
          </label>

          <input
            type="text"
            [(ngModel)]="formMascota.raza"
            placeholder="Raza"
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
          />
        </div>
      </div>

      <!-- Sexo -->
      <div class="flex flex-col gap-2">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Sexo
        </label>

        <div class="flex gap-2">
          @for (s of sexos; track s) {
            <button
              type="button"
              (click)="formMascota.sexo = s"
              [ngClass]="{
                'border-primary bg-primary-container/30 text-primary': formMascota.sexo === s,
                'border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high':
                  formMascota.sexo !== s,
              }"
              class="flex-1 py-2 rounded-lg text-xs font-bold border-2 transition-colors"
            >
              {{ s }}
            </button>
          }
        </div>
      </div>

      <!-- Tamaño -->
      <div class="flex flex-col gap-2">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Tamaño
        </label>

        <div class="flex gap-2">
          @for (t of tamanios; track t) {
            <button
              type="button"
              (click)="formMascota.tamanio = t"
              [ngClass]="{
                'border-primary bg-primary-container/30 text-primary': formMascota.tamanio === t,
                'border-transparent bg-surface-container text-on-surface-variant hover:bg-surface-container-high':
                  formMascota.tamanio !== t,
              }"
              class="flex-1 py-2 rounded-lg text-xs font-bold border-2 transition-colors"
            >
              {{ t }}
            </button>
          }
        </div>
      </div>
      <!-- CASTRADO -->
      <div
        class="col-span-2 flex items-center justify-between bg-surface-container-highest px-4 py-3 rounded-md"
      >
        <div>
          <p class="text-sm font-semibold text-on-surface">¿Está castrado?</p>
          <p class="text-xs text-on-surface-variant">Indica si la mascota fue castrada</p>
        </div>

        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer" [(ngModel)]="formMascota.castrado" />

          <!-- FONDO -->
          <div
            class="w-12 h-6 rounded-full transition-all bg-red-200 peer-checked:bg-primary"
          ></div>

          <!-- CÍRCULO -->
          <div
            class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all peer-checked:translate-x-6"
          ></div>
        </label>
      </div>
      <!-- Fecha -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Fecha de nacimiento
        </label>

        <input
          type="date"
          [(ngModel)]="formMascota.fecha_nacimiento"
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
        />
      </div>

      <!-- Pelaje + Comportamiento -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
            Tipo de pelaje
          </label>

          <input
            type="text"
            [(ngModel)]="formMascota.tipo_pelaje"
            placeholder="Corto, largo..."
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
          />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
            Comportamiento
          </label>

          <input
            type="text"
            [(ngModel)]="formMascota.comportamiento"
            placeholder="Activo, tranquilo..."
            class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary"
          />
        </div>
      </div>

      <!-- Observaciones -->
      <div class="flex flex-col gap-1">
        <label class="text-xs font-black uppercase tracking-widest text-on-surface-variant">
          Observaciones
        </label>

        <textarea
          [(ngModel)]="formMascota.observaciones"
          rows="3"
          placeholder="Información adicional..."
          class="bg-surface-container rounded-lg px-4 py-2 text-sm border border-outline-variant/30 focus:outline-none focus:border-primary resize-none"
        ></textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-outline-variant/30">
      <button
        type="button"
        (click)="cerrar.emit()"
        class="px-5 py-2 rounded-full text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-all"
      >
        Cancelar
      </button>

      <button
        type="button"
        (click)="guardar()"
        [disabled]="
          !formMascota.nombre ||
          !formMascota.id_especie ||
          !formMascota.tamanio ||
          !formMascota.sexo ||
          !formMascota.fecha_nacimiento
        "
        class="px-5 py-2 rounded-full editorial-gradient text-white text-sm font-bold hover:opacity-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Guardar
      </button>
    </div>
  </div>
</div>
