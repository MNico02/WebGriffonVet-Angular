<!-- confirm-delete-modal.component.html -->
@if (visible()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 w-[380px] animate-fade-in">

      <p class="text-center text-sm font-medium text-gray-600 mb-4">
        {{ mensaje() }}
      </p>

      <div class="flex justify-end gap-2">
        <button
          (click)="cancelado.emit()"
          class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 text-sm"
        >
          Cancelar
        </button>

        <button
          (click)="confirmado.emit()"
          class="px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 text-sm"
        >
          Eliminar
        </button>
      </div>

    </div>
  </div>
}
